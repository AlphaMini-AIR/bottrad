version: '3.8'

services:
  bot:
    build: .
    container_name: ai-quant-sniper
    restart: unless-stopped
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - MONGO_URI=mongodb://mongo:27017/bottrad
    volumes:
      - ./models:/app/models           # Mount thư mục chứa file .onnx
      - ./white_list.json:/app/white_list.json  # Mount file whitelist
      - ./logs:/app/logs               # Mount thư mục logs để lưu signals_*.json
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - mongo
    networks:
      - bot-network

  mongo:
    image: mongo:7.0
    container_name: bot-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=bottrad
    volumes:
      - mongo-data:/data/db
    networks:
      - bot-network
    ports:
      - "27017:27017"  # Mở port nếu cần truy cập từ ngoài (tùy chọn)

volumes:
  mongo-data:

networks:
  bot-network:
    driver: bridge